<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#050510">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="VELORA — Plataforma social de conexões futurística. Namoro, amizade e relacionamentos com design bioluminescente único.">
  <meta property="og:title" content="VELORA — Connect Beyond Limits">
  <meta property="og:description" content="A plataforma de conexões mais inovadora do mercado. Design futurístico, match em tempo real, galeria exclusiva.">
  <meta property="og:type" content="website">

  <title>VELORA — Connect Beyond Limits</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/assets/icon.svg">

  <!-- Preconnect for faster CDN -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://www.gstatic.com">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- App Styles -->
  <link rel="stylesheet" href="css/main.css?v=8">
  <link rel="stylesheet" href="css/components.css?v=8">
  <link rel="stylesheet" href="css/animations.css?v=8">

  <style>
    #loading-screen {
      position: fixed;
      inset: 0;
      background: #050510;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .loading-logo {
      font-family: 'Outfit', sans-serif;
      font-size: 3rem;
      font-weight: 900;
      background: linear-gradient(135deg, #00F5D4, #7C3CFF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: pulse 1.5s ease-in-out infinite;
    }
    .loading-bar {
      width: 140px;
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 99px;
      margin-top: 24px;
      overflow: hidden;
    }
    .loading-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #00F5D4, #FF2BD6);
      border-radius: 99px;
      animation: loadingFill 3s ease forwards;
    }
    @keyframes loadingFill {
      0%   { width: 0%; }
      60%  { width: 75%; }
      85%  { width: 90%; }
      100% { width: 100%; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.5; }
    }
  </style>
</head>

<body>
  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loading-logo">VELORA</div>
    <div style="font-family:'Outfit',sans-serif;font-size:0.75rem;color:rgba(255,255,255,0.25);margin-top:8px;letter-spacing:0.25em;text-transform:uppercase">
      Connect Beyond Limits
    </div>
    <div class="loading-bar">
      <div class="loading-bar-fill"></div>
    </div>
  </div>

  <!-- Particle Canvas (fixed background) -->
  <canvas id="particle-canvas"></canvas>

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <!-- Main App -->
  <div id="app"></div>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
      // Handle SW notification click → navigate to page
      navigator.serviceWorker.addEventListener('message', (e) => {
        if (e.data?.type === 'NOTIFICATION_CLICK' && e.data.url) {
          window.location.href = e.data.url;
        }
      });
    }
  </script>

  <!-- Global Error Boundary -->
  <script>
    window.addEventListener('error', (e) => {
      if (e.message?.includes('ResizeObserver') || e.message?.includes('Script error')) return;
      console.error('[VELORA] Uncaught error:', e.message, e.filename, e.lineno);
    });
    window.addEventListener('unhandledrejection', (e) => {
      if (e.reason?.code?.startsWith?.('auth/') || e.reason?.code?.startsWith?.('firestore/')) return;
      console.error('[VELORA] Unhandled rejection:', e.reason);
    });
  </script>

  <!-- Bootstrap script — dynamic import so the loading screen is
       always visible and the fallback timeout always fires -->
  <script type="module">
    const BOOT_START = Date.now();
    const MIN_LOADER_MS = 1800;

    function hideLoader() {
      const el = document.getElementById('loading-screen');
      if (el) el.classList.add('hidden');
    }

    function showFallback(msg) {
      hideLoader();
      const app = document.getElementById('app');
      if (!app) return;
      app.innerHTML = `
        <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;
          justify-content:center;background:#050510;gap:16px;padding:32px;text-align:center">
          <div style="font-family:Outfit,sans-serif;font-size:2.5rem;font-weight:900;
            background:linear-gradient(135deg,#00F5D4,#7C3CFF);
            -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">
            VELORA
          </div>
          <div style="color:rgba(255,255,255,0.4);font-family:Outfit,sans-serif;font-size:0.9rem">
            ${msg || 'Erro ao carregar. Verifique sua conexão e recarregue.'}
          </div>
          <button onclick="location.reload()"
            style="margin-top:16px;padding:14px 32px;border-radius:99px;
              background:linear-gradient(135deg,#00F5D4,#7C3CFF);
              color:#050510;font-family:Outfit,sans-serif;font-weight:700;
              font-size:1rem;border:none;cursor:pointer">
            Recarregar
          </button>
        </div>
      `;
    }

    // Emergency: always hide loader after 8s no matter what
    const emergency = setTimeout(() => showFallback('Tempo limite de carregamento'), 8000);

    try {
      const { boot } = await import('./js/app.js?v=8');
      await boot();

      // Guarantee minimum display time so loading bar animation is seen
      const elapsed = Date.now() - BOOT_START;
      const wait    = Math.max(0, MIN_LOADER_MS - elapsed);
      if (wait > 0) await new Promise(r => setTimeout(r, wait));

      clearTimeout(emergency);
      hideLoader();
    } catch (err) {
      clearTimeout(emergency);
      console.error('[VELORA] Boot error:', err);
      showFallback();
    }
  </script>
</body>
</html>
